<!DOCTYPE html>
<html>
<head>
<title>I Hate My Job</title>

<style>

body{
font-family:Arial;
background:linear-gradient(-45deg,#111,#1b1b1b,#111);
background-size:400% 400%;
animation:bgmove 12s ease infinite;
color:white;
text-align:center;
padding-top:120px;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
font-size:42px;
margin-bottom:40px;
}

button{
font-size:28px;
padding:22px 60px;
background:linear-gradient(135deg,#ff3b3b,#ff0000);
color:white;
border:none;
border-radius:16px;
cursor:pointer;
transition:all 0.15s ease;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

button:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(0,0,0,0.4);
}

button:active{
transform:scale(0.95);
}

.counter{
font-size:34px;
margin-top:40px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

.message{
margin-top:30px;
font-size:20px;
color:#bbb;
}

.share{
margin-top:25px;
font-size:16px;
padding:10px 25px;
background:#333;
border-radius:10px;
}

.meter{
margin-top:40px;
font-size:20px;
}

.bar{
width:300px;
height:14px;
background:#333;
margin:10px auto;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
background:#ff3b3b;
width:0%;
transition:width 0.6s ease;
}

.countries{
margin-top:40px;
font-size:18px;
color:#ccc;
}

.explosion{
position:fixed;
font-size:22px;
pointer-events:none;
animation:explode 1s forwards;
}

@keyframes explode{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-120px);opacity:0}
}

</style>
</head>

<body>

<h1>Bad day at work?</h1>

<button onclick="press()">I HATE MY JOB TODAY</button>

<div class="counter">
🔥 <span id="count">0</span> people hate their job right now
</div>

<button class="share" onclick="share()">
Share your suffering
</button>

<div class="message" id="msg"></div>

<div class="meter">
🌍 Global Work Misery Level
<div class="bar">
<div class="fill" id="miseryBar"></div>
</div>
<span id="miseryPercent">0%</span>
</div>

<div class="countries">
🌎 Today's misery by region
<div id="countryList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
"https://sbbyowlveqsmfcfkzzju.supabase.co",
"YOUR_ANON_KEY_HERE"
)

const messages = [
"This meeting could have been an email.",
"Your boss scheduled another meeting.",
"LinkedIn is waiting.",
"Coffee is the only solution.",
"At least it's not Monday forever.",
"Another pointless meeting starting soon.",
"You deserve a vacation.",
"Your coworkers feel the same."
]

const countryStats = {
US:0,
EU:0,
ASIA:0
}

function detectRegion(){

let tz = Intl.DateTimeFormat().resolvedOptions().timeZone

if(tz.includes("America")) return "US"
if(tz.includes("Europe")) return "EU"
return "ASIA"

}

function animateCount(newValue){

let el = document.getElementById("count")
let current = parseInt(el.innerText)

let step = Math.ceil((newValue-current)/10)

let interval = setInterval(()=>{

current += step

if(current >= newValue){
current = newValue
clearInterval(interval)
}

el.innerText = current

},20)

}

function updateMisery(count){

let percent = Math.min(100, Math.floor(count/10))

document.getElementById("miseryBar").style.width = percent+"%"
document.getElementById("miseryPercent").innerText = percent+"%"

}

function updateCountries(){

let html = `
🇺🇸 ${countryStats.US} hates<br>
🇪🇺 ${countryStats.EU} hates<br>
🌏 ${countryStats.ASIA} hates
`

document.getElementById("countryList").innerHTML = html

}

function explode(){

for(let i=0;i<6;i++){

let e=document.createElement("div")
e.className="explosion"
e.innerText="💥"

e.style.left=Math.random()*window.innerWidth+"px"
e.style.top=(window.innerHeight/2)+"px"

document.body.appendChild(e)

setTimeout(()=>e.remove(),1000)

}

}

async function loadCount(){

const { data } = await supabaseClient
.from('counter')
.select('value')
.eq('id',1)
.single()

animateCount(data.value)
updateMisery(data.value)

}

async function press(){

const { data } = await supabaseClient
.from('counter')
.select('value')
.eq('id',1)
.single()

let newValue = data.value + 1

await supabaseClient
.from('counter')
.update({value:newValue})
.eq('id',1)

animateCount(newValue)
updateMisery(newValue)

let random = messages[Math.floor(Math.random()*messages.length)]
document.getElementById("msg").innerText = random

let region = detectRegion()
countryStats[region]++
updateCountries()

explode()

}

function share(){

navigator.clipboard.writeText(window.location.href)

alert("Link copied. Send to your coworkers 😈")

}

// initial load
loadCount()

// fallback refresh
setInterval(loadCount,3000)

// realtime update
supabaseClient
.channel('counter-update')
.on(
'postgres_changes',
{ event:'UPDATE', schema:'public', table:'counter' },
payload => {
animateCount(payload.new.value)
updateMisery(payload.new.value)
}
)
.subscribe()

</script>

</body>
</html>
